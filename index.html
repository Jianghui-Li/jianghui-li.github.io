<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jianghui Li</title>
  <style>
    :root{
      --bg1:#071626;--bg2:#12355c;--ink:#eaf6ff;--panel:#0c1f338f;--line:#8fd2ff66;
    }
    body.light{--bg1:#b7dfff;--bg2:#e8f6ff;--ink:#0d2740;--panel:#ffffffbd;--line:#3f8ac766}
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:Inter,system-ui,sans-serif;overflow:hidden;color:var(--ink)}
    #tank{position:fixed;inset:0;width:100vw;height:100vh;display:block;background:linear-gradient(var(--bg2),var(--bg1));z-index:0}
    .about{position:fixed;top:20px;left:20px;z-index:2;display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:12px 14px;backdrop-filter: blur(6px)}
    .avatar{width:72px;height:72px;object-fit:cover;border-radius:12px;border:2px solid #7bc9ff}
    h1{margin:0;font-size:1.05rem}
    #panelToggle{position:fixed;left:20px;bottom:20px;z-index:3;padding:10px 14px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--ink)}
    aside{position:fixed;left:20px;top:130px;z-index:3;width:280px;max-height:calc(100vh - 170px);overflow:auto;padding:12px;border:1px solid var(--line);border-radius:14px;background:var(--panel);backdrop-filter: blur(6px);transition:transform .28s ease,opacity .28s ease}
    aside.hidden{transform:translateX(-115%);opacity:0;pointer-events:none}
    .group{margin-bottom:10px}
    select,button{width:100%;padding:9px;border-radius:10px;border:1px solid var(--line);background:#0e253a;color:var(--ink)}
    body.light select,body.light button{background:#f1f9ff}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .stats{font-size:.8rem;opacity:.85;margin:8px 0 0}
    @media (max-width: 760px){.about{right:16px;left:16px}.avatar{width:58px;height:58px}aside{width:min(92vw,320px);top:116px}}
  </style>
</head>
<body class="dark">
  <canvas id="tank"></canvas>

  <section class="about">
    <img class="avatar" src="images/jianghui-li.jpg" alt="Jianghui Li" />
    <h1>Hello👋! My name is Jianghui Li</h1>
  </section>

  <button id="panelToggle">Hide Controls</button>
  <aside id="controls">
    <div class="group"><select id="species"></select></div>
    <div class="group"><button id="addFish">Add Fish</button></div>
    <div class="group row"><button id="feedFish">Drop Food</button><button id="breedFish">Breed</button></div>
    <div class="group row"><button id="toggleMotion">Pause</button><button id="clear">Clear</button></div>
    <div class="group row"><button id="theme">Light Mode</button><button id="spawnSet">Populate</button></div>
    <p id="stats" class="stats"></p>
  </aside>

<script>
const c = document.getElementById('tank'); const ctx = c.getContext('2d');
const panel = document.getElementById('controls');
const speciesMeta = {
  fatheadMinnow:{name:'Fathead Minnow',size:[6,10],diet:'omnivore',zone:'mid',colors:['#7b654d','#b99670','#dcc49e'],shape:'minnow'},
  goldfish:{name:'Goldfish',size:[9,15],diet:'omnivore',zone:'mid',colors:['#e68224','#f0b23f','#fff1d0'],shape:'round'},
  guppy:{name:'Guppy',size:[3,5],diet:'omnivore',zone:'top',colors:['#59c4a4','#ffdb6e','#eb7a9c'],shape:'fancy'},
  tetra:{name:'Tetra',size:[3,5],diet:'omnivore',zone:'mid',colors:['#4389dc','#72e0d1','#d03d6f'],shape:'diamond'},
  bluegill:{name:'Bluegill',size:[12,18],diet:'omnivore',zone:'mid',colors:['#6083a6','#7caec9','#f0bd60'],shape:'tall'},
  blackCrappie:{name:'Black Crappie',size:[14,22],diet:'carnivore',zone:'mid',colors:['#6f7c86','#50575f','#d5dbe0'],shape:'tall'},
  whiteCrappie:{name:'White Crappie',size:[14,22],diet:'carnivore',zone:'mid',colors:['#bec8c5','#889490','#f3f4f0'],shape:'tall'},
  smallmouthBass:{name:'Smallmouth Bass',size:[20,34],diet:'carnivore',zone:'mid',colors:['#756548','#8f7b59','#cbb18b'],shape:'bass'},
  spottedBass:{name:'Spotted Bass',size:[20,34],diet:'carnivore',zone:'mid',colors:['#63744f','#7f9368','#d0dfb1'],shape:'bass'},
  largemouthBass:{name:'Largemouth Bass',size:[24,40],diet:'carnivore',zone:'mid',colors:['#617747','#7d9560','#d2dfb4'],shape:'bass'},
  commonCarp:{name:'Common Carp',size:[24,42],diet:'omnivore',zone:'bottom',colors:['#8ea149','#c9b55d','#f8efd5'],shape:'carp'},
  ghostCarp:{name:'Ghost Carp',size:[24,42],diet:'omnivore',zone:'mid',colors:['#cfd5d2','#eef2ee','#ffffff'],shape:'carp'},
  koiCarp:{name:'Koi Carp',size:[24,42],diet:'omnivore',zone:'mid',colors:['#f35f2c','#f8f7f2','#282828'],shape:'carp'},
  brownTrout:{name:'Brown Trout',size:[20,36],diet:'carnivore',zone:'mid',colors:['#705333','#9e7a4f','#e9ca94'],shape:'trout'},
  rainbowTrout:{name:'Rainbow Trout',size:[20,36],diet:'carnivore',zone:'mid',colors:['#7b919f','#d067a2','#eef4f8'],shape:'trout'},
  channelCatfish:{name:'Channel Catfish',size:[22,38],diet:'omnivore',zone:'bottom',colors:['#6f8795','#95a9b4','#d9e6ee'],shape:'catfish'},
  blueCatfish:{name:'Blue Catfish',size:[26,44],diet:'omnivore',zone:'bottom',colors:['#668198','#8ca9bb','#d9e6ef'],shape:'catfish'},
  walleye:{name:'Walleye',size:[22,34],diet:'carnivore',zone:'mid',colors:['#6f7046','#9f9a63','#e8db9f'],shape:'walleye'},
  lakeSturgeon:{name:'Lake Sturgeon',size:[42,70],diet:'benthivore',zone:'bottom',colors:['#666d64','#8f978c','#c9d0c4'],shape:'sturgeon'},
  northernPike:{name:'Northern Pike',size:[30,54],diet:'carnivore',zone:'top',colors:['#60733d','#8ba35f','#d4e6aa'],shape:'pike'},
  chainPickerel:{name:'Chain Pickerel',size:[24,38],diet:'carnivore',zone:'top',colors:['#6f7f43','#98aa63','#dce8b3'],shape:'pike'}
};
const fish=[]; const foods=[]; let paused=false;
const sel=document.getElementById('species'); Object.entries(speciesMeta).forEach(([k,v])=>sel.add(new Option(v.name,k)));
function rs(a,b){return a+Math.random()*(b-a)}
function zoneY(z){return z==='top'?rs(40,c.height*0.35):z==='bottom'?rs(c.height*0.66,c.height-22):rs(c.height*0.28,c.height*0.72)}
class Fish{constructor(type,palette=null){const m=speciesMeta[type];this.type=type;this.m=m;this.len=rs(...m.size);this.height=this.len*(m.shape==='tall'?0.55:m.shape==='sturgeon'?0.22:0.36);this.x=rs(20,c.width-20);this.y=zoneY(m.zone);this.dir=Math.random()<.5?-1:1;this.energy=1;this.turnTimer=rs(90,280);this.palette=(palette||m.colors).map(col=>vary(col,16));
const slow = Math.max(0.22, 1.35 - this.len/28); this.baseSpeed = slow*0.55; this.swim=this.baseSpeed;}
update(){this.turnTimer--;const nearest=nearestFood(this);if(nearest && this.m.diet!=='benthivore'){this.dir = nearest.x>this.x?1:-1;this.swim=this.baseSpeed*1.25;this.y += (nearest.y-this.y)*0.017;if(dist(this,nearest)<this.len*0.5) nearest.eaten=true;} else {this.swim=this.baseSpeed*(0.72+this.energy*0.35);if(this.turnTimer<0){if(Math.random()<0.32)this.dir*=-1;this.turnTimer=rs(120,320);}const targetY = zoneY(this.m.zone);this.y += (targetY-this.y)*0.003;}
this.energy=Math.max(.35,Math.min(1.2,this.energy+(Math.random()-.5)*0.01));
this.x += this.swim*this.dir; if(this.x<10||this.x>c.width-10)this.dir*=-1;
if(this.m.zone==='bottom') this.y=Math.min(c.height-18,Math.max(c.height*0.55,this.y));
else if(this.m.zone==='top') this.y=Math.max(14,Math.min(c.height*0.55,this.y));
else this.y=Math.max(24,Math.min(c.height-24,this.y));}
}
function nearestFood(f){let best=null,d=1e9;for(const p of foods){if(p.eaten)continue;const dd=dist(f,p);if(dd<d){d=dd;best=p;}}return best;}
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
function vary(hex,amt){const n=parseInt(hex.slice(1),16);const shift=()=>Math.floor((Math.random()*2-1)*amt);const r=Math.max(0,Math.min(255,(n>>16)+shift()));const g=Math.max(0,Math.min(255,((n>>8)&255)+shift()));const b=Math.max(0,Math.min(255,(n&255)+shift()));return `rgb(${r},${g},${b})`}
function drawPixelFish(f){const px=2; const w=Math.max(8,Math.round(f.len)); const h=Math.max(5,Math.round(f.height));
ctx.save(); ctx.translate(f.x,f.y); ctx.scale(f.dir,1);
for(let i=-w/2;i<w/2;i++){for(let j=-h/2;j<h/2;j++){
  let inShape=false;
  switch(f.m.shape){
    case 'pike': inShape=(Math.abs(j)<h*(0.15+0.22*(1-Math.abs(i)/(w/2)))) && i<w*0.42; break;
    case 'tall': inShape=((i*i)/(w*w*0.22)+(j*j)/(h*h*0.28)<1); break;
    case 'sturgeon': inShape=(Math.abs(j)<h*(0.12+0.12*(1-Math.abs(i)/(w/2)))) && i<w*0.46; break;
    case 'catfish': inShape=(Math.abs(j)<h*(0.2+0.18*(1-Math.abs(i)/(w/2)))) && i<w*0.44; break;
    case 'diamond': inShape=(Math.abs(i)/(w*0.5)+Math.abs(j)/(h*0.5)<1); break;
    case 'round': inShape=((i*i)/(w*w*0.25)+(j*j)/(h*h*0.24)<1); break;
    default: inShape=(Math.abs(j)<h*(0.18+0.18*(1-Math.abs(i)/(w/2)))) && i<w*0.45;
  }
  if(!inShape) continue;
  const t=(j+h/2)/h; const col=t<0.35?f.palette[0]:t<0.7?f.palette[1]:f.palette[2];
  ctx.fillStyle=col; ctx.fillRect(i*px,j*px,px,px);
}}
ctx.fillStyle=f.palette[0]; for(let t=-h*0.26;t<h*0.26;t++){ctx.fillRect((-w/2-4)*px,t*px,px,px);} // tail
if(f.m.shape==='catfish'){ctx.fillStyle='#222';ctx.fillRect((w*0.12)*px,(-h*0.12)*px,px,px);ctx.fillRect((w*0.12)*px,(h*0.08)*px,px,px)}
ctx.fillStyle='#111'; ctx.fillRect((w*0.2)*px,(-h*0.08)*px,px,px);
ctx.restore();
}
function dropFood(){for(let i=0;i<12;i++)foods.push({x:rs(40,c.width-40),y:rs(0,30),eaten:false,size:2+Math.random()*2,speed:0.5+Math.random()*0.4})}
function spawnInitial(){['fatheadMinnow','guppy','tetra','bluegill','blackCrappie','commonCarp','koiCarp','brownTrout','channelCatfish','walleye','northernPike','lakeSturgeon'].forEach(type=>{for(let i=0;i<(speciesMeta[type].size[0]<8?4:2);i++) fish.push(new Fish(type));});}
function breed(){if(fish.length<2)return; const a=fish[Math.floor(Math.random()*fish.length)],b=fish[Math.floor(Math.random()*fish.length)]; const type=Math.random()<.5?a.type:b.type; const child=new Fish(type,[a.palette[0],b.palette[1],Math.random()<.5?a.palette[2]:b.palette[2]]); child.len=(a.len+b.len)/2*(0.88+Math.random()*0.24); fish.push(child)}
function resize(){c.width=innerWidth; c.height=innerHeight}
window.addEventListener('resize',resize); resize(); spawnInitial();
function drawBg(){const g=ctx.createLinearGradient(0,0,0,c.height);if(document.body.classList.contains('light')){g.addColorStop(0,'#d7efff');g.addColorStop(1,'#86c5f0');} else {g.addColorStop(0,'#1a3d62');g.addColorStop(1,'#071829');}ctx.fillStyle=g;ctx.fillRect(0,0,c.width,c.height)}
function tick(){if(!paused){for(const p of foods){if(!p.eaten)p.y+=p.speed; if(p.y>c.height-4)p.eaten=true;} fish.forEach(f=>f.update());}
 drawBg(); foods.filter(p=>!p.eaten).forEach(p=>{ctx.fillStyle='#e8c85f';ctx.fillRect(p.x,p.y,p.size,p.size)}); fish.forEach(drawPixelFish);
 document.getElementById('stats').textContent=`Fish: ${fish.length} | Food: ${foods.filter(f=>!f.eaten).length}`; requestAnimationFrame(tick)}

addFish.onclick=()=>fish.push(new Fish(sel.value));
feedFish.onclick=dropFood; breedFish.onclick=breed; clear.onclick=()=>{fish.length=0;foods.length=0};
toggleMotion.onclick=e=>{paused=!paused;e.target.textContent=paused?'Play':'Pause'};
theme.onclick=e=>{document.body.classList.toggle('light');const l=document.body.classList.contains('light');e.target.textContent=l?'Dark Mode':'Light Mode'};
spawnSet.onclick=spawnInitial;
panelToggle.onclick=()=>{panel.classList.toggle('hidden');panelToggle.textContent=panel.classList.contains('hidden')?'Show Controls':'Hide Controls'};

tick();
</script>
</body>
</html>
