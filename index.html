<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jianghui Li</title>
  <style>
    :root {--bg:#061321;--panel:#0d2238cc;--ink:#e8f4ff;--accent:#7dd3fc;--accent2:#38bdf8;}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(circle at top,#0b2340,#030914);color:var(--ink);overflow:hidden}
    .app{display:grid;grid-template-columns:300px 1fr;gap:16px;height:100vh;padding:16px}
    .panel{background:var(--panel);border:1px solid #4b92c933;border-radius:16px;padding:14px;backdrop-filter: blur(6px);overflow:auto}
    .about{display:flex;gap:14px;align-items:center;margin-bottom:16px}
    .avatar{width:88px;height:88px;border-radius:16px;object-fit:cover;border:2px solid var(--accent)}
    h1{font-size:1.1rem;margin:0}
    .small{opacity:.8;font-size:.82rem;margin:4px 0 0}
    .group{margin:12px 0}
    label{display:block;font-size:.8rem;margin-bottom:6px;opacity:.9}
    select,button{width:100%;padding:10px;border-radius:10px;border:1px solid #74c4ff44;background:#0a1829;color:var(--ink)}
    button{cursor:pointer}
    .controls-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .tank-wrap{display:flex;justify-content:center;align-items:center;min-width:0}
    #tank{width:min(100%,1080px);aspect-ratio:16/9;border-radius:18px;border:2px solid #77d0ff66;background:linear-gradient(#163656,#0d2337 42%,#0a1a2c 70%,#0b1a12);box-shadow:0 25px 60px #0009}
    .legend{font-size:.76rem;opacity:.8}
    @media (max-width: 980px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr}.panel{max-height:42vh}}
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <section class="about">
        <img class="avatar" src="images/jianghui-li.jpg" alt="Jianghui Li" />
        <div>
          <h1>Hello👋! My name is Jianghui Li</h1>
        </div>
      </section>

      <div class="group">
        <label for="species">Add fish species</label>
        <select id="species"></select>
      </div>
      <div class="group"><button id="addFish">Add Fish</button></div>
      <div class="group"><button id="breedFish">Breed Two Random Fish</button></div>
      <div class="group"><button id="feedFish">Drop Food</button></div>
      <div class="group"><button id="toggle">Pause</button></div>
      <div class="group"><button id="clear">Clear Tank</button></div>

      <div class="group">
        <label>Tank navigation</label>
        <div class="controls-grid">
          <button data-move="up">↑</button><button data-move="reset">•</button><button data-move="right">→</button>
          <button data-move="left">←</button><button data-move="down">↓</button><button data-move=""> </button>
        </div>
      </div>
      <p class="legend" id="stats"></p>
    </aside>
    <main class="tank-wrap"><canvas id="tank" width="1280" height="720"></canvas></main>
  </div>

<script>
const speciesMeta = {
  fatheadMinnow:{name:'Fathead Minnow',size:[8,12],diet:'omnivore',zone:'mid',colors:['#95785a','#d2b48c','#6f5d4a']},
  goldfish:{name:'Goldfish',size:[10,18],diet:'omnivore',zone:'mid',colors:['#f2a93b','#f5c35b','#e6791a']},
  guppy:{name:'Guppy',size:[4,7],diet:'omnivore',zone:'top',colors:['#4ecdc4','#ffd166','#ff6b6b']},
  tetra:{name:'Tetra',size:[3,6],diet:'omnivore',zone:'mid',colors:['#54a0ff','#5f27cd','#10ac84']},
  bluegill:{name:'Bluegill',size:[18,28],diet:'omnivore',zone:'mid',colors:['#527aa3','#6aaac7','#ddab58']},
  blackCrappie:{name:'Black Crappie',size:[20,32],diet:'carnivore',zone:'mid',colors:['#7d8b97','#42484f','#d6dde2']},
  whiteCrappie:{name:'White Crappie',size:[20,32],diet:'carnivore',zone:'mid',colors:['#c8d0cb','#818f8d','#4f5a59']},
  smallmouthBass:{name:'Smallmouth Bass',size:[28,45],diet:'carnivore',zone:'mid',colors:['#816f52','#5f533f','#b4a07f']},
  spottedBass:{name:'Spotted Bass',size:[25,42],diet:'carnivore',zone:'mid',colors:['#6e7f52','#4f5f3f','#a7ba81']},
  largemouthBass:{name:'Largemouth Bass',size:[30,52],diet:'carnivore',zone:'mid',colors:['#7a8d4b','#4b5e33','#c7d4a5']},
  commonCarp:{name:'Common Carp',size:[35,65],diet:'omnivore',zone:'bottom',colors:['#d5c16e','#96a655','#e4d99f']},
  ghostCarp:{name:'Ghost Carp',size:[35,65],diet:'omnivore',zone:'mid',colors:['#dad7cf','#a5aca9','#ffffff']},
  koiCarp:{name:'Koi Carp',size:[35,65],diet:'omnivore',zone:'mid',colors:['#ffffff','#ff6b35','#1b1b1b']},
  brownTrout:{name:'Brown Trout',size:[28,50],diet:'carnivore',zone:'mid',colors:['#9d7a4f','#725535','#d8b173']},
  rainbowTrout:{name:'Rainbow Trout',size:[28,50],diet:'carnivore',zone:'mid',colors:['#8ca0aa','#d86d9d','#dbe8ef']},
  channelCatfish:{name:'Channel Catfish',size:[35,70],diet:'omnivore',zone:'bottom',colors:['#8199a4','#5a7380','#ccd8de']},
  blueCatfish:{name:'Blue Catfish',size:[40,75],diet:'omnivore',zone:'bottom',colors:['#7f98a8','#5b7486','#d8e5ef']},
  walleye:{name:'Walleye',size:[30,50],diet:'carnivore',zone:'mid',colors:['#9e9b62','#63633f','#ded39a']},
  lakeSturgeon:{name:'Lake Sturgeon',size:[60,100],diet:'benthivore',zone:'bottom',colors:['#7e8378','#555d53','#b6bcae']},
  northernPike:{name:'Northern Pike',size:[45,80],diet:'carnivore',zone:'top',colors:['#7f9a56','#4f6537','#bcd598']},
  chainPickerel:{name:'Chain Pickerel',size:[28,45],diet:'carnivore',zone:'top',colors:['#91a75f','#566935','#c8dd97']}
};
const sel=document.getElementById('species'); Object.entries(speciesMeta).forEach(([k,v])=>sel.add(new Option(v.name,k)));
const c=document.getElementById('tank'),x=c.getContext('2d');
const world={w:2200,h:1200,camX:0,camY:0};
const fish=[],food=[]; let paused=false;
class Fish{constructor(type,mix){this.type=type;const m=speciesMeta[type];this.len=rand(m.size[0],m.size[1]);this.x=Math.random()*world.w;this.y=zoneY(m.zone);this.dir=Math.random()<.5?-1:1;this.speed=0.3+50/this.len;this.hue=Math.random()*0.1-0.05;this.palette=mix||m.colors;}
update(){const target=food.find(f=>!f.eaten);if(target){this.dir=target.x>this.x?1:-1;this.y+=(target.y-this.y)*0.01; if(Math.hypot(this.x-target.x,this.y-target.y)<this.len/2) target.eaten=true;} else if(Math.random()<.01){this.dir*=-1;}
this.x+=this.speed*this.dir; if(this.x<0||this.x>world.w)this.dir*=-1; this.y+=Math.sin(Date.now()/550+this.x/40)*0.15; this.y=Math.max(20,Math.min(world.h-20,this.y));}
}
function zoneY(z){if(z==='top')return rand(80,350); if(z==='bottom')return rand(780,1120); return rand(300,900)}
function rand(a,b){return a+Math.random()*(b-a)}
function drawFish(f){const h=f.len*0.35;const g=x.createLinearGradient(f.x,f.y-h,f.x,f.y+h);g.addColorStop(0,shade(f.palette[0],-30));g.addColorStop(.55,f.palette[1]);g.addColorStop(1,'#f2f2eb');x.save();x.translate(f.x-world.camX,f.y-world.camY);x.scale(f.dir,1);x.fillStyle=g;pixelBody(-f.len/2,-h/2,f.len,h);x.fillStyle=shade(f.palette[2],-25);pixelBody(-f.len/2-6,-h/4,10,h/2);x.fillStyle='#111';x.fillRect(f.len/4,-h/6,3,3);x.restore();}
function pixelBody(px,py,w,h){const s=4; for(let i=0;i<w;i+=s){for(let j=0;j<h;j+=s){const e=((i-w/2)**2)/(w*w/4)+((j-h/2)**2)/(h*h/4); if(e<=1)x.fillRect(px+i,py+j,s,s);}}
}
function shade(hex,p){const n=parseInt(hex.slice(1),16),r=(n>>16)+p,g=((n>>8)&255)+p,b=(n&255)+p;return`rgb(${cl(r)},${cl(g)},${cl(b)})`}const cl=v=>Math.max(0,Math.min(255,v));
function addFish(type){fish.push(new Fish(type));}
function breed(){if(fish.length<2)return;const a=fish[Math.floor(Math.random()*fish.length)],b=fish[Math.floor(Math.random()*fish.length)];const kidType=Math.random()<.5?a.type:b.type;const mixed=[a.palette[0],b.palette[1],Math.random()<.5?a.palette[2]:b.palette[2]];const child=new Fish(kidType,mixed);child.len=((a.len+b.len)/2)*(0.9+Math.random()*0.2);fish.push(child)}
function dropFood(){for(let i=0;i<8;i++)food.push({x:world.camX+rand(120,c.width-120),y:world.camY+rand(0,80),eaten:false,s:2+Math.random()*2})}
function step(){if(!paused){fish.forEach(f=>f.update());food.forEach(p=>p.y+=0.9);for(const p of food){if(p.y>world.h) p.eaten=true;} }draw();requestAnimationFrame(step)}
function draw(){x.clearRect(0,0,c.width,c.height);x.fillStyle='rgba(255,255,255,.02)';for(let i=0;i<100;i++)x.fillRect((i*97-world.camX*0.2)%c.width,(i*41-world.camY*0.2)%c.height,2,2);food.filter(p=>!p.eaten).forEach(p=>{x.fillStyle='#f5d76e';x.fillRect(p.x-world.camX,p.y-world.camY,p.s,p.s)});fish.forEach(drawFish);document.getElementById('stats').textContent=`Fish: ${fish.length} | Food: ${food.filter(f=>!f.eaten).length}`}
function moveCam(dir){const amt=90; if(dir==='left')world.camX=Math.max(0,world.camX-amt); if(dir==='right')world.camX=Math.min(world.w-c.width,world.camX+amt); if(dir==='up')world.camY=Math.max(0,world.camY-amt); if(dir==='down')world.camY=Math.min(world.h-c.height,world.camY+amt); if(dir==='reset'){world.camX=(world.w-c.width)/2;world.camY=(world.h-c.height)/2;}}
document.getElementById('addFish').onclick=()=>addFish(sel.value);
document.getElementById('breedFish').onclick=breed;document.getElementById('feedFish').onclick=dropFood;document.getElementById('clear').onclick=()=>{fish.length=0;food.length=0};
document.getElementById('toggle').onclick=(e)=>{paused=!paused;e.target.textContent=paused?'Play':'Pause'};
document.querySelectorAll('[data-move]').forEach(b=>b.onclick=()=>moveCam(b.dataset.move));
['fatheadMinnow','goldfish','guppy','tetra','bluegill','commonCarp','koiCarp','largemouthBass','channelCatfish','northernPike'].forEach(addFish);
moveCam('reset');step();
</script>
</body>
</html>
